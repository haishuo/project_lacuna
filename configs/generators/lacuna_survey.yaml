# Lacuna-Survey generator registry.
#
# A specialised registry whose generators correspond to missingness
# mechanisms that are PLAUSIBLE FOR THE SURVEY DATA-COLLECTION PROCESS:
# self-administered or interviewer-administered questionnaires, polls,
# structured interviews. Domain (medical, political, education,
# marketing) is irrelevant — what matters is that the data was produced
# by asking respondents to fill in items.
#
# DELIBERATELY EXCLUDED FROM THE GENERIC tabular registry:
#   - Latent-variable / longitudinal MNAR (observational, not single-wave)
#   - Competing events / symptom-triggered (clinical longitudinal)
#   - Detection-limit / quantitation-limit (instrument process)
#   - Heavy-tailed distributional MCAR (instrument artifacts)
#   - ColumnBlocks / CrossClassified (admin / EHR block patterns)
#
# Generated from `lacuna_tabular_110.yaml` by curated allow-list.
#
# 2026-04-26 (post-v2 diagnostic) revisions:
#   - Dropped MNAR-Logistic: produces a 1-col tiny-rate pattern on bfi
#     that is literally identical to MAR-Logistic's pattern. Including
#     both forces the model to assign different labels to indistin-
#     guishable patterns.
#   - Dropped MNAR-Q90: 2.2% overall miss-rate on bfi, indistinguishable
#     from low-rate MAR threshold variants.
#   - Dropped MNAR-Privacy and MNAR-UnderReport: similar low-coverage
#     overlap with MAR-DemoGated-Sparse.
# These removals tighten the MNAR pattern fingerprint to the heavier
# self-censoring / value-truncation regime that's actually distinct
# from MAR in pattern space.
# 2026-04-26 (post-v7 diagnostic):
#   Added four low-rate broad-spread variants. Real-world surveys
#   show "many columns each missing a tiny amount" patterns
#   (bfi: 0.6 % across 25 cols; chile: 0.6 % across 5 cols;
#   cars93: 0.8 % across 18 cols). Existing generators were bimodal:
#   either single-column at any rate, or many columns at high rate.
#   The four additions fill the (low rate × broad column-spread) cell:
#     MAR-DemoGated-LowBroad      1–2 % rate × 80 % cols
#     MAR-DemoGated-VeryLow       1–2 % rate × 70 % cols
#     MAR-PartialResponse-Sparse  4–6 % rate × 70 % cols
#     MNAR-Q90-Broad              3–5 % rate × 80 % cols (truncation)

name: lacuna_survey
description: Survey collection-process specialisation. Mechanisms plausible for self/interviewer-administered questionnaires
  regardless of subject domain.
