# Canonical training config for the missingness-feature ablation sweep.
#
# Mirrors semisynthetic_full.yaml exactly: real underlying X from the 24
# tabular training datasets, 7 held-out real validation datasets, synthetic
# missingness mechanisms from lacuna_tabular_110, 100 epochs.
#
# Why not pure synthetic: per Molenberghs, real missingness mechanisms are
# unidentifiable from observed data alone — the mechanism MUST be synthetic.
# But the underlying X can (and should) be real. Pure-synthetic Gaussian-tensor
# data is too "pat" to produce committee-convincing ablation conclusions.
#
# Usage (on Forge, in tmux):
#   python scripts/run_ablation.py \
#       --config configs/training/ablation.yaml \
#       --seeds 1 2 3 4 5 \
#       --csv /mnt/artifacts/project_lacuna/ablation/semisynth_5seed.csv

seed: 42
device: cuda
output_dir: /mnt/artifacts/project_lacuna/runs

data:
  max_rows: 128
  max_cols: 48

  # Training datasets (24 real tabular datasets of varying size)
  train_datasets:
    # Large datasets (>10k samples)
    - credit_card_default
    - superconductor
    - magic_telescope
    - pulsar_stars
    - avocado_prices
    - bike_sharing
    - letter_recognition
    - optical_digits
    - satellite
    - spambase
    - pendigits
    # Medium datasets (1k-10k samples)
    - abalone
    - cardiotocography
    - page_blocks
    - steel_plates
    - wine_quality_red
    - wine_white
    - yeast
    - concrete
    # Small datasets (<1k samples)
    - breast_cancer
    - diabetes
    - wine
    - parkinsons
    - vehicle

  # Held-out real validation datasets
  val_datasets:
    - banknote
    - heart_disease
    - ionosphere
    - segmentation
    - glass
    - ecoli
    - iris

model:
  hidden_dim: 128
  evidence_dim: 64
  n_layers: 4
  n_heads: 4
  dropout: 0.1

training:
  epochs: 100
  batch_size: 16
  batches_per_epoch: 200
  val_batches: 50
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_steps: 400
  patience: 20
  min_delta: 0.001

generator:
  config_name: lacuna_tabular_110

loss_matrix:
  - [0.0, 0.3, 1.0]   # Green action
  - [0.2, 0.0, 0.2]   # Yellow action
  - [1.0, 0.3, 0.0]   # Red action
